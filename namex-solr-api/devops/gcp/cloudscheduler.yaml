# GCP Cloud Scheduler job definitions for namex-solr-api
#
# These jobs call the Solr sync endpoints on a recurring schedule.
# Auth: Cloud Scheduler uses GCP OIDC (sa-api service account).
#       The service account must have roles/run.invoker on the Cloud Run service.
#
# To create or update jobs, run:
#   gcloud scheduler jobs create http JOB_NAME \
#     --project=PROJECT_ID \
#     --location=northamerica-northeast1 \
#     --schedule="SCHEDULE" \
#     --time-zone="America/Vancouver" \
#     --uri=SERVICE_URL/internal/solr/update/ENDPOINT \
#     --http-method=GET \
#     --oidc-service-account-email=SERVICE_ACCOUNT \
#     --oidc-token-audience=SERVICE_URL
#
# Replace SERVICE_URL with the Cloud Run service URL for the target environment.
# Use `gcloud run services describe SERVICE_NAME --region=northamerica-northeast1` to get it.

jobs:

  - name: namex-solr-sync
    description: "Sync pending Solr updates from the DB every 5 minutes"
    schedule: "*/5 * * * *"
    time-zone: "America/Vancouver"
    http-method: GET
    path: /internal/solr/update/sync
    environments:
      dev:
        project: a083gt-dev
        service-name: namex-solr-api-dev
        service-account: sa-api@a083gt-dev.iam.gserviceaccount.com
      test:
        project: a083gt-test
        service-name: namex-solr-api-test
        service-account: sa-api@a083gt-test.iam.gserviceaccount.com
      sandbox:
        project: a083gt-integration
        service-name: namex-solr-api-sandbox
        service-account: sa-api@a083gt-integration.iam.gserviceaccount.com
      prod:
        project: a083gt-prod
        service-name: namex-solr-api-prod
        service-account: sa-api@a083gt-prod.iam.gserviceaccount.com

  - name: namex-solr-sync-heartbeat
    description: "Verify Solr follower replication health every 30 minutes"
    schedule: "*/30 * * * *"
    time-zone: "America/Vancouver"
    http-method: GET
    path: /internal/solr/update/sync/heartbeat
    environments:
      dev:
        project: a083gt-dev
        service-name: namex-solr-api-dev
        service-account: sa-api@a083gt-dev.iam.gserviceaccount.com
      test:
        project: a083gt-test
        service-name: namex-solr-api-test
        service-account: sa-api@a083gt-test.iam.gserviceaccount.com
      sandbox:
        project: a083gt-integration
        service-name: namex-solr-api-sandbox
        service-account: sa-api@a083gt-integration.iam.gserviceaccount.com
      prod:
        project: a083gt-prod
        service-name: namex-solr-api-prod
        service-account: sa-api@a083gt-prod.iam.gserviceaccount.com
